name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here. Follow SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Reconstruct version or commit
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version and operating system
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Remove secrets and private target information.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

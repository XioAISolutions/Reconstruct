name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What concrete user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Security and trust-boundary considerations
    validations:
      required: true

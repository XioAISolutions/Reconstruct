<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="Reconstruct — Turn a web application into a build-ready specification for AI coding agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#111c33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <style>
      .title { font: 700 62px -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; letter-spacing: -0.03em; }
      .sub   { font: 400 22px -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .step  { font: 600 16px "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; letter-spacing: 0.02em; }
      .arrow { stroke: #3b5170; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1200" height="300" rx="16" fill="url(#bg)"/>
  <rect x="0" y="0" width="8" height="300" fill="url(#accent)"/>

  <!-- Wordmark -->
  <text x="72" y="118" class="title" fill="#f8fafc">Reconstruct</text>
  <rect x="74" y="138" width="132" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="72" y="182" class="sub" fill="#94a3b8">Turn a web application into a build-ready specification</text>
  <text x="72" y="212" class="sub" fill="#94a3b8">for AI coding agents.</text>

  <!-- Pipeline chips -->
  <g transform="translate(72, 244)">
    <g>
      <rect x="0" y="0" width="98" height="34" rx="17" fill="#13233f" stroke="#26466f"/>
      <text x="49" y="22" class="step" fill="#7dd3fc" text-anchor="middle">Observe</text>
    </g>
    <line x1="106" y1="17" x2="130" y2="17" class="arrow"/>
    <g transform="translate(138,0)">
      <rect x="0" y="0" width="92" height="34" rx="17" fill="#13233f" stroke="#26466f"/>
      <text x="46" y="22" class="step" fill="#7dd3fc" text-anchor="middle">Specify</text>
    </g>
    <line x1="238" y1="17" x2="262" y2="17" class="arrow"/>
    <g transform="translate(270,0)">
      <rect x="0" y="0" width="72" height="34" rx="17" fill="#13233f" stroke="#26466f"/>
      <text x="36" y="22" class="step" fill="#7dd3fc" text-anchor="middle">Build</text>
    </g>
    <line x1="350" y1="17" x2="374" y2="17" class="arrow"/>
    <g transform="translate(382,0)">
      <rect x="0" y="0" width="96" height="34" rx="17" fill="#13233f" stroke="#26466f"/>
      <text x="48" y="22" class="step" fill="#7dd3fc" text-anchor="middle">Compare</text>
    </g>
    <line x1="486" y1="17" x2="510" y2="17" class="arrow"/>
    <g transform="translate(518,0)">
      <rect x="0" y="0" width="88" height="34" rx="17" fill="#13233f" stroke="#26466f"/>
      <text x="44" y="22" class="step" fill="#7dd3fc" text-anchor="middle">Correct</text>
    </g>
  </g>

  <!-- Decorative evidence panel on the right -->
  <g transform="translate(792, 44)" opacity="0.96">
    <rect x="0" y="0" width="336" height="212" rx="12" fill="#0e1a2f" stroke="#1e3252"/>
    <circle cx="20" cy="22" r="5" fill="#f87171"/>
    <circle cx="38" cy="22" r="5" fill="#fbbf24"/>
    <circle cx="56" cy="22" r="5" fill="#34d399"/>
    <text x="316" y="27" class="step" fill="#475569" text-anchor="end">appspec.json</text>
    <line x1="0" y1="42" x2="336" y2="42" stroke="#1e3252"/>
    <g font="14px monospace" fill="#64748b">
      <text x="20" y="70" class="step" fill="#22d3ee">"version"</text><text x="128" y="70" class="step" fill="#94a3b8">: "0.1.0",</text>
      <text x="20" y="98" class="step" fill="#22d3ee">"screens"</text><text x="128" y="98" class="step" fill="#94a3b8">: [ 1 ],</text>
      <text x="20" y="126" class="step" fill="#22d3ee">"status"</text><text x="118" y="126" class="step" fill="#4ade80">: "observed",</text>
      <text x="20" y="154" class="step" fill="#22d3ee">"confidence"</text><text x="158" y="154" class="step" fill="#94a3b8">: 0.99,</text>
      <text x="20" y="182" class="step" fill="#22d3ee">"unknowns"</text><text x="138" y="182" class="step" fill="#fbbf24">: [ 2 ]</text>
    </g>
  </g>
</svg>
